<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - AllTownz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-50">
    <div x-data="sellerApp()" class="max-w-md mx-auto p-4">
        <h1 class="text-2xl font-bold text-green-600 mb-4">📊 Seller Dashboard</h1>
        
        <!-- Stats -->
        <div class="grid grid-cols-3 gap-3 mb-4">
            <div class="bg-green-100 p-3 rounded-lg text-center">
                <p class="text-sm text-gray-600">Orders</p>
                <p class="font-bold text-xl" x-text="stats.orders">0</p>
            </div>
            <div class="bg-black text-white p-3 rounded-lg text-center">
                <p class="text-sm text-gray-400">Revenue</p>
                <p class="font-bold text-xl" x-text="'UGX '+stats.revenue">0</p>
            </div>
            <div class="bg-white p-3 rounded-lg text-center shadow">
                <p class="text-sm text-gray-600">Products</p>
                <p class="font-bold text-xl" x-text="stats.products">0</p>
            </div>
        </div>
        
        <!-- Add Product -->
        <button @click="showAddProduct = !showAddProduct" 
                class="w-full bg-green-600 text-white py-3 rounded-lg mb-4 hover:bg-green-700">
            + Add New Product
        </button>
        
        <div x-show="showAddProduct" class="bg-white p-4 rounded-lg shadow mb-4">
            <input type="text" x-model="newProduct.name" placeholder="Product name" class="w-full p-2 border rounded mb-2">
            <input type="number" x-model="newProduct.price" placeholder="Price (UGX)" class="w-full p-2 border rounded mb-2">
            <input type="number" x-model="newProduct.stock" placeholder="Stock quantity" class="w-full p-2 border rounded mb-2">
            <button @click="addProduct()" class="bg-green-500 text-white px-4 py-2 rounded">Save Product</button>
        </div>
        
        <!-- Product List -->
        <h3 class="font-bold text-lg mb-2">Your Products</h3>
        <div class="space-y-2">
            <template x-for="prod in products">
                <div class="bg-white p-3 rounded-lg shadow flex justify-between items-center">
                    <div>
                        <p class="font-semibold" x-text="prod.name"></p>
                        <p class="text-sm text-gray-600">Stock: <span x-text="prod.stock"></span></p>
                    </div>
                    <div class="text-right">
                        <p class="text-green-600 font-bold" x-text="'UGX '+prod.price"></p>
                        <button @click="deleteProduct(prod.id)" class="text-red-500 text-sm">Delete</button>
                    </div>
                </div>
            </template>
        </div>
    </div>

    <script>
    function sellerApp() {
        return {
            showAddProduct: false,
            stats: { orders: 12, revenue: '2,450,000', products: 8 },
            products: [
                {id: 1, name: 'Samsung Galaxy A54', price: '850,000', stock: 15},
                {id: 2, name: 'Nike Running Shoes', price: '350,000', stock: 7}
            ],
            newProduct: { name: '', price: '', stock: '' },
            
            addProduct() {
                if(!this.newProduct.name) return alert('Enter product name');
                this.products.push({
                    id: Date.now(),
                    name: this.newProduct.name,
                    price: this.newProduct.price,
                    stock: parseInt(this.newProduct.stock) || 0
                });
                this.newProduct = { name: '', price: '', stock: '' };
                this.showAddProduct = false;
                this.stats.products = this.products.length;
                alert('Product added successfully!');
            },
            
            deleteProduct(id) {
                if(confirm('Delete this product?')) {
                    this.products = this.products.filter(p => p.id !== id);
                    this.stats.products = this.products.length;
                }
            }
        }
    }
    </script>
</body>
</html>
