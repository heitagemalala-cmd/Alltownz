<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AllTownz</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-6 rounded-2xl shadow-lg max-w-sm w-full">
        <h1 class="text-2xl font-bold text-green-600 text-center mb-6">Welcome Back</h1>
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="text" id="email" placeholder="Enter email" class="w-full p-3 border rounded-lg focus:border-green-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="password" id="password" placeholder="••••••••" class="w-full p-3 border rounded-lg focus:border-green-500 outline-none">
            </div>
            <button type="submit" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700">Login</button>
        </form>
        <div class="mt-4 text-center text-sm text-gray-500">
            <p>Demo Accounts:</p>
            <p>Admin: admin@alltownz.com / admin123</p>
            <p>Seller: seller@gmail.com / seller123</p>
            <p>Buyer: buyer@gmail.com / buyer123</p>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            if (data.token) {
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));
                alert('✅ Login successful!');
                window.location.href = '/';
            } else {
                alert('❌ ' + data.error);
            }
        });
    </script>
</body>
</html>
