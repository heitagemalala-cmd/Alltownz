<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - AllTownz</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-6 rounded-2xl shadow-lg max-w-sm w-full">
        <h1 class="text-2xl font-bold text-green-600 text-center mb-6">Welcome Back</h1>
        
        <form id="loginForm" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-1">Email</label>
                <input type="text" id="email" placeholder="Enter email" 
                       class="w-full p-3 border rounded-lg focus:border-green-500 outline-none">
            </div>
            <div>
                <label class="block text-sm font-medium mb-1">Password</label>
                <input type="password" id="password" placeholder="••••••••" 
                       class="w-full p-3 border rounded-lg focus:border-green-500 outline-none">
            </div>
            <button type="submit" id="loginBtn" class="w-full bg-green-600 text-white py-3 rounded-lg font-semibold hover:bg-green-700 transition">
                Login
            </button>
        </form>

        <div class="mt-4 text-center text-sm text-gray-500 space-y-1">
            <p class="font-bold text-gray-700">Test Credentials:</p>
            <p>👑 Admin: <span class="font-mono text-xs">admin@alltownz.com</span> / <span class="font-mono text-xs">admin123</span></p>
            <p>📦 Seller: <span class="font-mono text-xs">seller@gmail.com</span> / <span class="font-mono text-xs">seller123</span></p>
            <p>🛒 Buyer: <span class="font-mono text-xs">buyer@gmail.com</span> / <span class="font-mono text-xs">buyer123</span></p>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            
            if(!email || !password) {
                alert('Please enter both email and password.');
                return;
            }

            // Change button text to show loading
            loginBtn.textContent = 'Logging in...';
            loginBtn.disabled = true;

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (data.token && data.user) {
                    // Save credentials
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('user', JSON.stringify(data.user));

                    // ✅ SMART REDIRECT BASED ON ROLE
                    if (data.user.role === 'admin') {
                        window.location.href = '/admin.html';
                    } else if (data.user.role === 'seller') {
                        window.location.href = '/seller-dashboard.html';
                    } else {
                        window.location.href = '/'; // Buyers go to Home
                    }
                } else {
                    alert('❌ ' + (data.error || 'Invalid credentials'));
                    loginBtn.textContent = 'Login';
                    loginBtn.disabled = false;
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('❌ Connection error. Make sure the backend is running.');
                loginBtn.textContent = 'Login';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
