<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Seller Dashboard - AllTownz</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
</head>
<body class="bg-gray-100">
    <div x-data="sellerApp()" class="max-w-lg mx-auto p-4 bg-white min-h-screen">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-2xl font-bold text-green-600">📦 My Shop</h1>
            <button onclick="logout()" class="text-sm text-red-500 font-semibold">Logout</button>
        </div>
        
        <div class="mb-4 p-3 bg-gray-50 rounded-lg border border-gray-200">
            <p>Welcome, <strong x-text="user.name"></strong></p>
            <p class="text-sm">Role: <span class="text-green-600 font-medium" x-text="user.role"></span></p>
        </div>

        <div x-show="!user.shop" class="bg-yellow-50 border border-yellow-200 p-4 rounded-lg mb-4">
            <h2 class="font-bold text-yellow-800">🚀 Register Your Business</h2>
            <p class="text-sm text-yellow-700 mb-3">To start selling, register your shop. The Admin will review and approve it.</p>
            <input type="text" x-model="newShop.name" placeholder="Shop Name" class="w-full p-2 border border-yellow-300 rounded mb-2">
            <textarea x-model="newShop.description" placeholder="Short description" class="w-full p-2 border border-yellow-300 rounded mb-2"></textarea>
            <button @click="registerShop()" class="w-full bg-yellow-600 text-white py-2 rounded font-semibold hover:bg-yellow-700">Register Shop</button>
        </div>

        <div x-show="user.shop" class="mb-4 p-3 rounded-lg border" 
             :class="user.shop.approved ? 'bg-green-50 border-green-200' : 'bg-red-50 border-red-200'">
            <div class="flex justify-between items-center">
                <div>
                    <p class="font-bold text-lg" x-text="user.shop.name"></p>
                    <p class="text-sm" x-text="user.shop.approved ? '✅ Active & Verified' : '⏳ Pending Admin Approval'"></p>
                </div>
                <span :class="user.shop.approved ? 'bg-green-600' : 'bg-gray-400'" class="text-white text-xs px-3 py-1 rounded-full">Status</span>
            </div>
        </div>

        <div x-show="user.shop && user.shop.approved" class="bg-white border-2 border-green-100 p-4 rounded-lg mb-4 shadow-sm">
            <h3 class="font-bold mb-3 text-gray-800">➕ Add New Product</h3>
            <input type="text" x-model="newProduct.name" placeholder="Product name" class="w-full p-2 border rounded mb-2">
            <input type="number" x-model="newProduct.price" placeholder="Price (UGX)" class="w-full p-2 border rounded mb-2">
            <input type="text" x-model="newProduct.category" placeholder="Category (e.g. Fashion, Electronics)" class="w-full p-2 border rounded mb-2">
            <button @click="addProduct()" class="w-full bg-green-600 text-white py-2 rounded font-bold hover:bg-green-700">Upload Product</button>
        </div>

        <div>
            <h3 class="font-bold text-gray-800 mb-2">📋 My Inventory</h3>
            <div class="space-y-2">
                <template x-for="prod in myProducts">
                    <div class="bg-white p-3 rounded-lg shadow-sm border border-gray-100 flex justify-between items-center">
                        <div>
                            <p class="font-semibold text-sm" x-text="prod.name"></p>
                            <p class="text-green-600 font-bold text-sm" x-text="'UGX '+prod.price.toLocaleString()"></p>
                        </div>
                        <span class="text-xs bg-gray-100 px-2 py-1 rounded text-gray-600" x-text="prod.category"></span>
                    </div>
                </template>
                <div x-show="myProducts.length === 0" class="text-center text-gray-400 text-sm py-6 bg-gray-50 rounded-lg">🛒 No products yet.</div>
            </div>
        </div>
    </div>
    <script>

        return {
            user: JSON.parse(localStorage.getItem('user')) || { name: 'Guest', role: 'customer' },
            newShop: { name: '', description: '' },
            newProduct: { name: '', price: '', category: '' },
            myProducts: [],
            async init() {
                if(!localStorage.getItem('token')) {
